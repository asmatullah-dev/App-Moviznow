<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Vivid Emerald Pop Gradient -->
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    
    <!-- Neon Accent Glow -->
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#10b981" flood-opacity="0.9"/>
    </filter>
  </defs>

  <g transform="translate(0, -50)">
    <!-- Abstract 'M' architectural silhouette (50% Black) -->
    <path d="M 90 350 L 90 100 L 256 230 L 422 100 L 422 350" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Glowing Play Button -->
    <path d="M 215 160 L 330 230 L 215 300 Z" fill="url(#emerald)" filter="url(#neon)" stroke="url(#emerald)" stroke-width="24" stroke-linejoin="round" />
  </g>

  <!-- Wordmark label: Emerald text "MovizNow" with No border -->
  <text x="256" y="475" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="108" font-weight="900" text-anchor="middle" fill="#10b981" letter-spacing="-3">
    MovizNow
  </text>
</svg>
